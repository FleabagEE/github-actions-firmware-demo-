name: Firmware Issue Demo

on:
  issues:
    types:
      - opened

jobs:
  inspect-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Print issue context
        run: |
          echo "Firmware issue demo workflow triggered"
          echo "Issue title: ${{ github.event.issue.title }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Issue state: ${{ github.event.issue.state }}"

      - name: Print labels JSON
        run: |
          echo 'Labels payload: ${{ toJson(github.event.issue.labels) }}'

      - name: Check firmware label
        id: check-firmware
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.issue.labels || []).map(label => label.name);
            const hasFirmwareLabel = labels.includes("firmware");

            core.info(`Parsed labels: ${labels.join(", ") || "(none)"}`);
            core.info(`Firmware label present: ${hasFirmwareLabel}`);
            core.setOutput("has_firmware_label", String(hasFirmwareLabel));

      - name: Add firmware issue to Project v2 and populate fields
        if: steps.check-firmware.outputs.has_firmware_label == 'true'
        uses: actions/github-script@v7
        env:
          PROJECT_OWNER: FleabagEE
          PROJECT_NUMBER: "1"
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const owner = process.env.PROJECT_OWNER;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER, 10);
            const contentId = context.payload.issue.node_id;
            const labels = (context.payload.issue.labels || []).map(label => label.name);

            const projectQuery = `
              query($login: String!, $number: Int!) {
                user(login: $login) {
                  projectV2(number: $number) {
                    id
                    title
                  }
                }
              }
            `;

            const projectResult = await github.graphql(projectQuery, {
              login: owner,
              number: projectNumber,
            });

            const project = projectResult.user?.projectV2;
            if (!project) {
              core.setFailed(`Project not found: ${owner} / ${projectNumber}`);
              return;
            }

            core.info(`Found project: ${project.title} (${project.id})`);
            core.info(`Issue contentId: ${contentId}`);

            const addItemMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item {
                    id
                  }
                }
              }
            `;

            const addResult = await github.graphql(addItemMutation, {
              projectId: project.id,
              contentId,
            });

            const itemId = addResult.addProjectV2ItemById.item.id;
            core.info(`Added item to project. Item id: ${itemId}`);

            const updateFieldMutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }
                ) {
                  projectV2Item {
                    id
                  }
                }
              }
            `;

            await github.graphql(updateFieldMutation, {
              projectId: project.id,
              itemId,
              fieldId: "PVTSSF_lAHOB35cU84BVt7yzhRHvjg",
              optionId: "f75ad846",
            });

            core.info("Set Status to Todo");

            if (labels.includes("bug")) {
              await github.graphql(updateFieldMutation, {
                projectId: project.id,
                itemId,
                fieldId: "PVTSSF_lAHOB35cU84BVt7yzhRmEhQ",
                optionId: "a1209999",
              });
              core.info("Set Priority to High");
            } else if (labels.includes("enhancement")) {
              await github.graphql(updateFieldMutation, {
                projectId: project.id,
                itemId,
                fieldId: "PVTSSF_lAHOB35cU84BVt7yzhRmEhQ",
                optionId: "bbd13c4a",
              });
              core.info("Set Priority to Medium");
            }

      - name: Skip non-firmware issues
        if: steps.check-firmware.outputs.has_firmware_label != 'true'
        run: |
          echo "This issue does not have the firmware label."
          echo "Skipping automation for now."
